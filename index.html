<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novium Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="container">
        <div id="auth-controls" class="auth-bar">
            <span id="user-status">جاري فحص الجلسة...</span>
            <button id="login-btn" onclick="handleAuthClick()" style="display: none;"><i class="fab fa-google"></i> تسجيل الدخول</button>
            <button id="logout-btn" onclick="handleSignoutClick()" style="display: none;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <header class="profile-header">
            <!-- جزء الصورة بعد التحديث لدعم الـ Upload المخفي -->
            <div class="avatar-wrapper" id="avatar-container" style="position: relative; display: inline-block;">
                <img src="assets/logo.jpg" alt="Yousef" class="avatar" id="user-avatar">
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                <div id="upload-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); color: #fff; border-radius: 50%; justify-content: center; align-items: center; cursor: pointer; font-size: 12px;">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <h1 id="user-display-name">youssif mohammed</h1>
            <p class="subtitle">Full-Stack Web Developer & Cybersecurity Enthusiast</p>
            <div class="social-links">
                <a href="https://github.com/Novium-Nodes" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://www.instagram.com/noviumnodes?utm_source=qr" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@noviumnodes?is_from_webapp=1&sender_device=pc" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </header>

        <main class="projects-section">
            <div class="section-header">
                <h2>مشاريع المنظمة والمستودعات 🚀</h2>
                <button id="open-modal-btn" class="add-project-btn admin-only" title="إضافة مشروع جديد" style="display: none;"><i class="fas fa-plus"></i></button>
            </div>
            
            <div class="projects-grid" id="projects-container">
            </div>
        </main>

        <footer>
            <p>© 2026 NoviumNodes. جميع الحقوق محفوظة.</p>
        </footer>
    </div>

    <div id="project-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إضافة مشروع جديد للمشغل/البورتفوليو</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <form id="add-project-form">
                <div class="form-group">
                    <label for="proj-title">اسم المشروع:</label>
                    <input type="text" id="proj-title" placeholder="مثال: NoviumPlayer" required>
                </div>
                <div class="form-group">
                    <label for="proj-lang">نوع/لغة الكود (Badge):</label>
                    <select id="proj-lang">
                        <option value="js">JavaScript (JS)</option>
                        <option value="html">HTML / CSS</option>
                        <option value="node">Node.js</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="proj-desc">وصف المشروع:</label>
                    <textarea id="proj-desc" rows="3" placeholder="اكتب وصفاً مختصراً ومميزاً للمشروع..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="proj-live">رابط الفتح المباشر (Live Demo):</label>
                    <input type="url" id="proj-live" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label for="proj-repo">رابط مستودع جيت هب (Repository):</label>
                    <input type="url" id="github-repo" placeholder="https://github.com/.../..." required>
                </div>
                <button type="submit" class="submit-btn">حفظ ونشر المشروع ✨</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
